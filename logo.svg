<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer white ring -->
  <circle cx="100" cy="100" r="98" fill="white"/>
  <!-- Blue background circle -->
  <circle cx="100" cy="100" r="91" fill="#3d5f9f"/>
  <!-- Inner white ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="white" stroke-width="2.5"/>

  <!-- Robot head -->
  <circle cx="100" cy="44" r="16" fill="white"/>
  <!-- Antenna -->
  <line x1="100" y1="28" x2="100" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="100" cy="20" r="3" fill="white"/>
  <!-- Robot eyes -->
  <circle cx="93" cy="44" r="4" fill="#3d5f9f"/>
  <circle cx="107" cy="44" r="4" fill="#3d5f9f"/>
  <!-- Robot eye dots -->
  <circle cx="93" cy="44" r="2" fill="white"/>
  <circle cx="107" cy="44" r="2" fill="white"/>
  <!-- Robot mouth line -->
  <line x1="93" y1="52" x2="107" y2="52" stroke="#3d5f9f" stroke-width="2" stroke-linecap="round"/>

  <!-- AIFUN text -->
  <text x="100" y="108"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="40"
    fill="white"
    text-anchor="middle"
    letter-spacing="3">AIFUN</text>

  <!-- AI OPTIMAL SOLUTION -->
  <text x="100" y="138"
    font-family="Arial, sans-serif"
    font-weight="600"
    font-size="12"
    fill="white"
    text-anchor="middle"
    letter-spacing="1">AI OPTIMAL SOLUTION</text>
</svg>
